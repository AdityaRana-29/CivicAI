services:
  # ── Backend API ───────────────────────────────────────────────────────────────
  - type: web
    name: civicai-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false      # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DUPLICATE_THRESHOLD
        value: "0.85"
      - key: DUPLICATE_RADIUS_METERS
        value: "100"
      - key: CLIENT_URL
        sync: false   # set to your Vercel/Render frontend URL

  # ── Frontend ──────────────────────────────────────────────────────────────────
  - type: web
    name: civicai-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set to https://civicai-server.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
